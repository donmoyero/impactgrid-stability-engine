,<script>
const DIJO_API = 'https://impactgrid-dijo-api.onrender.com';

let allJobs = [];
let userCV = "";

/* =========================
   INIT
========================= */
document.addEventListener('DOMContentLoaded', async function() {
  await loadJobs();
  await askForCV(); // simulate CV input for now
});

/* =========================
   LOAD JOBS
========================= */
async function loadJobs() {
  try {
    const res = await fetch(DIJO_API + '/ai/jobs');
    const data = await res.json();

    allJobs = data.jobs || [];

  } catch (e) {
    console.error('Job load error', e);
  }
}

/* =========================
   TEMP CV INPUT (TEST)
========================= */
async function askForCV() {
  userCV = prompt("Paste your CV text (for testing):");

  if (!userCV) return;

  matchJobs();
}

/* =========================
   MATCH & RANK JOBS
========================= */
async function matchJobs() {
  const results = [];

  for (let job of allJobs.slice(0, 10)) { // limit to avoid slow API
    try {
      const res = await fetch(DIJO_API + '/ai/match', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          cv_text: userCV,
          job_description: job.description
        })
      });

      const data = await res.json();

      results.push({
        ...job,
        score: data.result?.score || 0,
        reasons: data.result?.reasons || []
      });

    } catch (e) {
      console.error('match error', e);
    }
  }

  // 🔥 SORT BEST FIRST
  results.sort((a, b) => b.score - a.score);

  renderTopMatches(results);
}

/* =========================
   RENDER TOP MATCHES
========================= */
function renderTopMatches(jobs) {
  const el = document.getElementById('jobsGrid');

  if (!jobs.length) {
    el.innerHTML = '<p style="text-align:center;padding:40px;">No matches found</p>';
    return;
  }

  el.innerHTML = jobs.map((j, i) => `
    <div class="job-card" style="border:2px solid ${i === 0 ? 'gold' : '#222'};">
      <h3>${escapeHTML(j.title)}</h3>
      <p><strong>${escapeHTML(j.company_name)}</strong></p>

      <p>🔥 Match Score: <strong>${j.score}%</strong></p>

      <ul>
        ${(j.reasons || []).slice(0,2).map(r => `<li>${escapeHTML(r)}</li>`).join('')}
      </ul>

      <a href="./dijo.html" class="job-apply-btn">Apply with Dijo</a>
    </div>
  `).join('');
}

/* =========================
   SAFE HTML
========================= */
function escapeHTML(str) {
  return String(str)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;");
}
</script>
